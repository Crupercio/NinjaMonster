{% extends "base.html" %}
{% load sticker_tags %}
{% block title %}{{ pokemon.name }} - {{ rarity_label }}{% endblock %}

{% block extra_css %}
<style>
.sd-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 2rem 1rem 4rem;
  gap: 1.5rem;
}

.sd-back {
  align-self: flex-start;
  color: var(--text-3);
  font-size: 0.8rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.sd-back:hover { color: var(--text-1); }

.sd-carousel {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}

.sd-arrow {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-2, #cbd5e1);
  font-size: 1.6rem;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}

.sd-arrow:hover { background: rgba(255,255,255,0.14); color: #fff; }
.sd-arrow:disabled { opacity: 0.2; pointer-events: none; }

.sd-card {
  position: relative;
  width: 700px;
  height: 950px;
  flex-shrink: 0;
}

.sd-sprite {
  position: absolute;
  width: 475px;
  height: 475px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -54%);
  object-fit: contain;
  image-rendering: auto;
  z-index: 3;
  transition: opacity 0.2s, filter 0.2s;
}

.sd-sprite.missing-sprite {
  filter: brightness(0);
  opacity: 0.2;
}

.sd-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: fill;
  pointer-events: none;
  z-index: 2;
}

.sd-info {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.sd-name {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-1);
  font-family: "Chakra Petch", sans-serif;
}

.sd-labels {
  font-size: 0.85rem;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sd-copies {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--accent-gold, #e8b84b);
}

.sd-missing-label {
  font-size: 0.85rem;
  color: #6b7280;
  font-style: italic;
}

.sd-dots {
  display: flex;
  gap: 0.45rem;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 300px;
}

.sd-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: background 0.15s, transform 0.15s;
  cursor: pointer;
  flex-shrink: 0;
}

.sd-dot.is-owned { background: rgba(255,255,255,0.35); }
.sd-dot.is-active { background: var(--accent-gold, #e8b84b); transform: scale(1.35); }

@media (max-width: 920px) {
  .sd-carousel {
    width: 100%;
    justify-content: center;
    gap: 0.8rem;
  }

  .sd-card {
    width: min(78vw, 520px);
    height: min(106vw, 705px);
  }

  .sd-sprite {
    width: 68%;
    height: 68%;
  }
}

@media (max-width: 620px) {
  .sd-page {
    padding: 1.4rem 0.8rem 3rem;
  }

  .sd-carousel {
    gap: 0.5rem;
  }

  .sd-arrow {
    width: 42px;
    height: 42px;
    font-size: 1.25rem;
  }
}
</style>
{% endblock %}

{% block content %}
{{ slides|json_script:"sticker-slides-data" }}
<script>
const SPRITE_URLS = {
  {% for slide in slides %}"{{ slide.variant }}": "{{ pokemon.pokedex_number|sticker_sprite:slide.variant }}"{% if not forloop.last %},{% endif %}
  {% endfor %}
};

function stickerDetailCarousel(initialIndex) {
  const slides = JSON.parse(document.getElementById("sticker-slides-data").textContent);
  const safeIndex = Math.min(Math.max(initialIndex, 0), Math.max(slides.length - 1, 0));
  return {
    idx: safeIndex,
    slides,
    current: slides[safeIndex] || null,
    syncCurrent() {
      this.current = this.slides[this.idx] || this.slides[0] || null;
    },
    spriteUrl(variant) {
      return SPRITE_URLS[variant] || "";
    },
    prev() {
      if (this.idx > 0) {
        this.idx -= 1;
        this.syncCurrent();
      }
    },
    next() {
      if (this.idx < this.slides.length - 1) {
        this.idx += 1;
        this.syncCurrent();
      }
    },
  };
}
</script>

<div class="sd-page" x-data="stickerDetailCarousel({{ current_index }})">
  <a class="sd-back" href="javascript:history.back()">← Back</a>

  <div class="sd-carousel">
    <button class="sd-arrow" @click="prev" :disabled="idx === 0">‹</button>

    <div class="sd-card">
      <img class="sd-sprite"
           :src="current ? spriteUrl(current.variant) : ''"
           :class="{ 'missing-sprite': current && !current.owned }"
           :alt="current ? '{{ pokemon.name }} ' + current.variant_label : '{{ pokemon.name }}'">
      <img class="sd-frame"
           src="/static/img/frames/{{ rarity }}.png"
           alt="">
    </div>

    <button class="sd-arrow" @click="next" :disabled="idx === slides.length - 1">›</button>
  </div>

  <div class="sd-info">
    <div class="sd-name">{{ pokemon.name }}</div>
    <div class="sd-labels" x-text="current ? current.variant_label + ' · {{ rarity_label }}' : '{{ rarity_label }}'"></div>
    <template x-if="current && current.owned">
      <div class="sd-copies" x-text="current.copies + '× owned'"></div>
    </template>
    <template x-if="current && !current.owned">
      <div class="sd-missing-label">Not collected yet</div>
    </template>
  </div>

  <div class="sd-dots">
    <template x-for="(s, i) in slides" :key="s.variant">
      <div class="sd-dot"
           :class="{ 'is-owned': s.owned, 'is-active': i === idx }"
           @click="idx = i"
           :title="s.variant_label + (s.owned ? '' : ' (missing)')">
      </div>
    </template>
  </div>
</div>
{% endblock %}
