{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated — Collector's Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg-void:#080810; --bg-surface:#111122; --bg-card:#161628;
      --border-hi:rgba(255,255,255,.13); --text-1:#f0f0f8; --text-2:#a8a8c0; --text-3:#666680;
      --accent-gold:#e8b84b; --gold-light:#f5d980; --gold-dark:#8a6520;
      --radius-md:6px; --radius-xl:16px;
    }
    html, body { min-height:100%; background:var(--bg-void); color:var(--text-1); font-family:"Plus Jakarta Sans",sans-serif; }
    body::before {
      content:""; position:fixed; inset:0;
      background-image:linear-gradient(rgba(232,184,75,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(232,184,75,.018) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }
    .auth-topbar { position:fixed; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-dark),var(--accent-gold),var(--gold-light),var(--accent-gold),var(--gold-dark)); z-index:100; }
    .auth-shell { position:relative; z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem; }
    .auth-card {
      width:100%; max-width:420px;
      background:linear-gradient(160deg,var(--bg-surface),var(--bg-card));
      border:1px solid var(--border-hi); border-radius:var(--radius-xl);
      padding:2.75rem 2.25rem; position:relative; overflow:hidden; text-align:center;
    }
    .auth-card::before {
      content:""; position:absolute; top:0; left:12%; right:12%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(232,184,75,.5),transparent);
    }
    .success-icon {
      width:72px; height:72px; border-radius:50%;
      background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.3);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 1.5rem;
    }
    .auth-card-title { font-family:"Chakra Petch",sans-serif; font-size:1.35rem; font-weight:700; color:var(--accent-gold); letter-spacing:.05em; margin-bottom:.5rem; }
    .auth-card-body { font-size:.88rem; color:var(--text-2); line-height:1.65; margin-bottom:2rem; }
    .auth-card-body strong { color:var(--text-1); }
    .btn-auth {
      display:block; width:100%; padding:.85rem;
      background:linear-gradient(135deg,var(--gold-dark),var(--accent-gold));
      color:var(--bg-void); font-family:"Chakra Petch",sans-serif; font-size:.9rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; border:none; border-radius:var(--radius-md);
      cursor:pointer; text-decoration:none; transition:opacity .15s,transform .12s;
    }
    .btn-auth:hover { opacity:.9; transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="auth-topbar"></div>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
      </div>
      <div class="auth-card-title">Password Updated</div>
      <div class="auth-card-body">
        Your password has been <strong>successfully changed</strong>.<br><br>
        You can now sign in to your account using your new password.
      </div>
      <a href="{% url 'account_login' %}" class="btn-auth">Sign In</a>
    </div>
  </div>
</body>
</html>
