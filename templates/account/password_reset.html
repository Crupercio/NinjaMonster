{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Collector's Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-void:#080810; --bg-surface:#111122; --bg-card:#161628; --bg-felt:#1a1a2e;
      --border-md:rgba(255,255,255,.08); --border-hi:rgba(255,255,255,.13);
      --text-1:#f0f0f8; --text-2:#a8a8c0; --text-3:#666680;
      --accent-gold:#e8b84b; --gold-light:#f5d980; --gold-dark:#8a6520;
      --radius-sm:4px; --radius-md:6px; --radius-xl:16px;
    }
    html, body { min-height:100%; background:var(--bg-void); color:var(--text-1); font-family:"Plus Jakarta Sans",sans-serif; }
    body::before {
      content:""; position:fixed; inset:0;
      background-image: linear-gradient(rgba(232,184,75,.018) 1px,transparent 1px), linear-gradient(90deg,rgba(232,184,75,.018) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; z-index:0;
    }
    .auth-topbar { position:fixed; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold-dark),var(--accent-gold),var(--gold-light),var(--accent-gold),var(--gold-dark)); z-index:100; }
    .auth-home-link {
      position:fixed; top:1.25rem; left:1.5rem; display:flex; align-items:center; gap:.45rem;
      font-family:"Chakra Petch",sans-serif; font-size:.68rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:var(--text-3); text-decoration:none; transition:color .15s; z-index:200;
    }
    .auth-home-link:hover { color:var(--accent-gold); }
    .auth-shell {
      position:relative; z-index:1; min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:4rem 1.5rem;
    }
    .auth-card {
      width:100%; max-width:420px;
      background:linear-gradient(160deg,var(--bg-surface),var(--bg-card));
      border:1px solid var(--border-hi); border-radius:var(--radius-xl);
      padding:2.75rem 2.25rem; position:relative; overflow:hidden;
    }
    .auth-card::before {
      content:""; position:absolute; top:0; left:12%; right:12%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(232,184,75,.5),transparent);
    }
    .auth-logo { display:block; width:80px; height:80px; object-fit:contain; margin:0 auto 1.5rem; filter:drop-shadow(0 0 20px rgba(232,184,75,.3)); }
    .auth-card-title { font-family:"Chakra Petch",sans-serif; font-size:1.35rem; font-weight:700; color:var(--accent-gold); letter-spacing:.05em; text-align:center; margin-bottom:.3rem; }
    .auth-card-sub { font-size:.8rem; color:var(--text-3); text-align:center; margin-bottom:2rem; line-height:1.55; }
    .form-field { display:flex; flex-direction:column; gap:.35rem; margin-bottom:1.25rem; }
    .form-field label { font-family:"Chakra Petch",sans-serif; font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--text-3); }
    .form-field input {
      width:100%; padding:.72rem 1rem; background:var(--bg-void); border:1px solid var(--border-md);
      border-radius:var(--radius-sm); color:var(--text-1); font-family:"Plus Jakarta Sans",sans-serif;
      font-size:.95rem; outline:none; transition:border-color .2s,box-shadow .2s;
    }
    .form-field input:focus { border-color:rgba(232,184,75,.55); box-shadow:0 0 0 3px rgba(232,184,75,.1); }
    .btn-auth {
      width:100%; padding:.85rem; background:linear-gradient(135deg,var(--gold-dark),var(--accent-gold));
      color:var(--bg-void); font-family:"Chakra Petch",sans-serif; font-size:.9rem; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; border:none; border-radius:var(--radius-md);
      cursor:pointer; transition:opacity .15s,transform .12s;
    }
    .btn-auth:hover { opacity:.9; transform:translateY(-1px); }
    .auth-link-row { text-align:center; font-size:.85rem; color:var(--text-2); margin-top:1.25rem; }
    .auth-link-row a { color:var(--accent-gold); text-decoration:none; font-weight:600; }
    .auth-link-row a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="auth-topbar"></div>
  <a href="/" class="auth-home-link">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2L4 6l4 4"/></svg>
    Home
  </a>
  <div class="auth-shell">
    <div class="auth-card">
      <img src="{% static 'images/logo.png' %}" alt="" class="auth-logo">
      <div class="auth-card-title">Reset Password</div>
      <div class="auth-card-sub">Enter your account email and we'll send a reset link.</div>
      <form method="post">
        {% csrf_token %}
        <div class="form-field">
          <label for="id_email">Email address</label>
          <input type="email" name="email" id="id_email" autocomplete="email" required autofocus>
        </div>
        <button type="submit" class="btn-auth">Send Reset Link</button>
      </form>
      <div class="auth-link-row"><a href="{% url 'account_login' %}">&larr; Back to login</a></div>
    </div>
  </div>
</body>
</html>
